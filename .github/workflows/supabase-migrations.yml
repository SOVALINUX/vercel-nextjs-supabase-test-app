name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-migrations.yml'

jobs:
  deploy-migrations:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    environment: Production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && missing+=("SUPABASE_ACCESS_TOKEN")
          [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ]   && missing+=("SUPABASE_PROJECT_ID")
          [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]  && missing+=("SUPABASE_DB_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required GitHub secrets: ${missing[*]}"
            echo ""
            echo "Add them at: Settings → Secrets and variables → Actions → Environments → Production"
            echo "  SUPABASE_ACCESS_TOKEN  — supabase.com → Account → Access Tokens"
            echo "  SUPABASE_PROJECT_ID    — supabase.com → Project → Settings → General (Reference ID)"
            echo "  SUPABASE_DB_PASSWORD   — supabase.com → Project → Settings → Database → Password"
            exit 1
          fi

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
